# fakeaws coverage_matrix.yaml — sole source of truth for S48-T7's
# TestFullCoverageAudit. Each entry asserts five invariants:
#  (a) integration test in handlers/handlers_test.go matches integration_test_func_name
#  (b) examples/working/<working_dir_name>/ exists OR working_exempt: true with reason
#  (c) examples/misconfigured/<misconfigured_dir_name>/ exists OR misconfigured_exempt
#  (d) examples/updates/<updates_dir_name>/ exists OR updates_exempt
#  (e) for non-null scenario_resource_type, ≥1 aws-*.yaml has the key under resources:
#      AND the matrix entry's aws_resource_type is named in aws_resource_anchors
#
# Per S43-T10 acceptance: this file ships EMPTY at S43-T1 (just this header).
# Entries land in the SAME PR that ships the bundle (handler + tests + examples
# + scenario with anchors). See slices-43-48-plan.md S48-T7 for the full schema.
#
# Schema:
# - aws_service: e.g. "iam", "s3", "ec2", "rds", "dynamodb", "eks", "sqs",
#                     "route53", "secretsmanager"
# - aws_resource_type: per-API resource id, e.g. "aws_iam_role", "aws_db_instance"
# - scenario_resource_type: cloud-neutral scenario.schema.json key
#   (compute|networking|database|kubernetes|iam|registry|redis|storage|pubsub|
#    dns|cloud_run|secret_manager|dynamodb|messaging) or null for non-generator
#   resources (e.g., AMI fixtures)
# - working_dir_name / misconfigured_dir_name / updates_dir_name: per-tree
#   directory names under examples/{working,misconfigured,updates}/
#   (default: aws_resource_type without aws_ prefix; can diverge per tree)
# - working_exempt / misconfigured_exempt / updates_exempt: bool, with
#   *_exempt_reason: required iff exempt
# - integration_test_func_name: regex matching ≥1 TestXxx in handlers_test.go
#   (default: ^Test.*<aws_resource_type-camel-cased>.*)
#
# AWS provider version pin: hashicorp/aws ~> 5.70 (concepts.md § Resolved
# decisions item 14). Bumps require a single PR updating this comment, every
# example's required_providers block, every prompt template, and the e2e
# harness's provider config.

entries:
  # IAM (S43-T6 handlers, S43-T14 e2e + this matrix entry).
  - aws_service: iam
    aws_resource_type: aws_iam_role
    scenario_resource_type: iam
    working_dir_name: iam_role
    misconfigured_dir_name: iam_attachment_missing_role
    updates_dir_name: update_iam_role_description
    integration_test_func_name: "^TestIAM_CreateGetListUpdateDeleteRole$"
  - aws_service: iam
    aws_resource_type: aws_iam_policy
    scenario_resource_type: iam
    working_exempt: true
    working_exempt_reason: "Policy lifecycle is exercised inside iam_attachment_missing_role (creates a policy, attaches it, then asserts the misconfigured FK rejection); standalone working/iam_policy/ is gap-filled in S48-T6."
    misconfigured_exempt: true
    misconfigured_exempt_reason: "Policy alone has no FK refs (validated in iam_attachment_missing_role)."
    updates_exempt: true
    updates_exempt_reason: "v1 IAM policies are immutable in fakeaws — UpdatePolicy isn't a v1 endpoint; S48-T6 reconsiders if a policy-version update example is added."
    integration_test_func_name: "^TestIAM_PolicyCRUD$"
  - aws_service: iam
    aws_resource_type: aws_iam_role_policy_attachment
    scenario_resource_type: iam
    working_exempt: true
    working_exempt_reason: "Attachment lifecycle is asserted inside TestIAM_AttachDetachRolePolicy; standalone working/role_policy_attachment/ would duplicate that coverage."
    misconfigured_dir_name: iam_attachment_missing_role
    updates_exempt: true
    updates_exempt_reason: "Attachments are not patchable — they're delete + recreate. Tested via the misconfigured example."
    integration_test_func_name: "^TestIAM_AttachDetachRolePolicy$"

  # S3 (S43-T8 handlers, S43-T14 e2e + this matrix entry).
  # Per concepts.md "Resolved decisions" item / examples/README.md:
  # S3 v1 has no cross-resource FK refs, so misconfigured_exempt.
  - aws_service: s3
    aws_resource_type: aws_s3_bucket
    scenario_resource_type: storage
    working_dir_name: s3_bucket
    misconfigured_exempt: true
    misconfigured_exempt_reason: "S3 v1 has no cross-resource FK refs (bucket policy refs are inert strings; FK gates would land if ACL→IAM routing were modelled). Documented in examples/README.md."
    updates_dir_name: update_s3_bucket_versioning
    integration_test_func_name: "^TestS3_CreateHeadGetDeleteBucket$"
  - aws_service: s3
    aws_resource_type: aws_s3_bucket_versioning
    scenario_resource_type: storage
    working_exempt: true
    working_exempt_reason: "Versioning lifecycle is exercised inside working/s3_bucket via aws_s3_bucket_versioning."
    misconfigured_exempt: true
    misconfigured_exempt_reason: "Versioning has no v1 cross-resource FK refs."
    updates_dir_name: update_s3_bucket_versioning
    integration_test_func_name: "^TestS3_VersioningRoundTrip$"
  - aws_service: s3
    aws_resource_type: aws_s3_bucket_server_side_encryption_configuration
    scenario_resource_type: storage
    working_exempt: true
    working_exempt_reason: "Encryption is asserted via TestS3_PublicAccessBlockRoundTrip + the generic-config GET/PUT round-trip; standalone working dir would duplicate."
    misconfigured_exempt: true
    misconfigured_exempt_reason: "No FK refs on SSE config."
    updates_exempt: true
    updates_exempt_reason: "SSE config is set-once for v1 fixtures; v2 update is exercised in update_s3_bucket_versioning's broader bundle."
    integration_test_func_name: "^TestS3_PublicAccessBlockRoundTrip$"

  # EC2 (S44 handlers in fakeaws@485391b/cd1e76c/1987703/1713ba3,
  # S44-T12 e2e + these matrix entries). VPC, Subnet, IGW, RouteTable,
  # Route, RouteTableAssociation, SecurityGroup, Instance — 8 entries
  # mirroring the resource set in scenarios/training/aws-vpc-network.yaml +
  # aws-instance.yaml.
  - aws_service: ec2
    aws_resource_type: aws_vpc
    scenario_resource_type: networking
    working_dir_name: vpc_network
    misconfigured_exempt: true
    misconfigured_exempt_reason: "VPC has no inbound FK refs (children FK on VPC; the misconfigured target is on the children, e.g., instance_missing_subnet)."
    updates_exempt: true
    updates_exempt_reason: "VPC at v1 is immutable (CIDR is set on create, no UpdateVpc endpoint exists in fakeaws v1)."
    integration_test_func_name: "^TestEC2_CreateDescribeDeleteVPC$"
  - aws_service: ec2
    aws_resource_type: aws_subnet
    scenario_resource_type: networking
    working_dir_name: vpc_network
    misconfigured_dir_name: instance_missing_subnet
    updates_exempt: true
    updates_exempt_reason: "Subnet immutable at v1 (CIDR + AZ set on create); update flows are exercised on dependent resources (route_table_association, instance)."
    integration_test_func_name: "^TestEC2_SubnetCRUDAndFK$"
  - aws_service: ec2
    aws_resource_type: aws_internet_gateway
    scenario_resource_type: networking
    working_dir_name: vpc_network
    misconfigured_exempt: true
    misconfigured_exempt_reason: "IGW lifecycle (attach-to-missing-vpc 404, detach-on-vpc-delete) is asserted in TestEC2_InternetGatewayLifecycle; standalone misconfigured dir would duplicate."
    updates_exempt: true
    updates_exempt_reason: "IGW state is detach/attach (binary) — exercised in working/vpc_network's apply path."
    integration_test_func_name: "^TestEC2_InternetGatewayLifecycle$"
  - aws_service: ec2
    aws_resource_type: aws_route_table
    scenario_resource_type: networking
    working_dir_name: vpc_network
    misconfigured_exempt: true
    misconfigured_exempt_reason: "Route table FK violations (missing VPC, second association on subnet) covered in TestEC2_RouteTableAndAssociation."
    updates_exempt: true
    updates_exempt_reason: "Route tables are append-only at v1 — route additions exercised inline in working/vpc_network."
    integration_test_func_name: "^TestEC2_RouteTableAndAssociation$"
  - aws_service: ec2
    aws_resource_type: aws_route
    scenario_resource_type: networking
    working_dir_name: vpc_network
    misconfigured_exempt: true
    misconfigured_exempt_reason: "Route requires existing route_table; FK rejection exercised at the route_table layer."
    updates_exempt: true
    updates_exempt_reason: "Routes immutable at v1 (delete + recreate, not modify)."
    integration_test_func_name: "^TestEC2_RouteTableAndAssociation$"
  - aws_service: ec2
    aws_resource_type: aws_route_table_association
    scenario_resource_type: networking
    working_dir_name: vpc_network
    misconfigured_exempt: true
    misconfigured_exempt_reason: "UNIQUE-per-subnet violation asserted in TestEC2_RouteTableAndAssociation; duplicating to a misconfigured tofu example would be redundant."
    updates_exempt: true
    updates_exempt_reason: "Association is delete + recreate at v1."
    integration_test_func_name: "^TestEC2_RouteTableAndAssociation$"
  - aws_service: ec2
    aws_resource_type: aws_security_group
    scenario_resource_type: networking
    working_dir_name: vpc_network
    misconfigured_exempt: true
    misconfigured_exempt_reason: "Duplicate-name and missing-VPC failures asserted in TestEC2_SecurityGroupCRUDPlusRules + the post-merge regression test."
    updates_dir_name: update_security_group_rules
    integration_test_func_name: "^TestEC2_SecurityGroupCRUDPlusRules$"
  - aws_service: ec2
    aws_resource_type: aws_instance
    scenario_resource_type: compute
    working_dir_name: basic_instance
    misconfigured_dir_name: instance_missing_subnet
    updates_exempt: true
    updates_exempt_reason: "Instance attribute updates are no-ops at v1 (state machine handles lifecycle); update_security_group_rules covers the SG-membership update flow that AWS provider applies to instances."
    integration_test_func_name: "^TestEC2_RunInstancesAndTerminate$"


  # RDS (S45-T3 handlers, S45-T10 e2e + these matrix entries). 5
  # entries mirroring scenarios/training/aws-rds.yaml's anchor list
  # (aws_vpc + aws_subnet are already credited via EC2 entries).
  - aws_service: rds
    aws_resource_type: aws_db_subnet_group
    scenario_resource_type: database
    working_dir_name: rds_instance
    misconfigured_dir_name: rds_missing_subnet_group
    updates_exempt: true
    updates_exempt_reason: "Subnet group is set-once at v1 — instance-side parameter group updates exercised in update_rds_parameter_group."
    integration_test_func_name: "^TestRDS_DBSubnetGroupCRUD$"
  - aws_service: rds
    aws_resource_type: aws_db_parameter_group
    scenario_resource_type: database
    working_dir_name: rds_instance
    misconfigured_exempt: true
    misconfigured_exempt_reason: "Parameter group has no inbound FK refs (the FK is on the instance side); orphan parameter groups don't fail."
    updates_dir_name: update_rds_parameter_group
    integration_test_func_name: "^TestRDS_ParameterGroupCRUD$"
  - aws_service: rds
    aws_resource_type: aws_db_instance
    scenario_resource_type: database
    working_dir_name: rds_instance
    misconfigured_dir_name: rds_missing_subnet_group
    updates_dir_name: update_rds_parameter_group
    integration_test_func_name: "^TestRDS_DBInstance_FullChain$"
  # Note: aws_rds_cluster (Aurora) and the read-replica chain are
  # tested in repository/rds_test.go (TestRDSCluster_ParameterGroupAttachment,
  # TestRDS_ReadReplicaChainRESTRICT) and handlers/rds_test.go
  # (TestRDS_ReadReplicaChainRESTRICT) but no dedicated coverage_matrix
  # entry exists yet because (a) no scenario currently lands an Aurora
  # cluster — scenarios/training/aws-rds.yaml uses a single instance,
  # (b) aws_db_instance with replicate_source_db is the same resource
  # type as aws_db_instance, just with one extra arg. Both gap-fill
  # under S48-T6 if scenarios require Aurora or read replicas.

  # DynamoDB (S45-T5 handlers, S45-T10 e2e + this matrix entry).
  - aws_service: dynamodb
    aws_resource_type: aws_dynamodb_table
    scenario_resource_type: dynamodb
    working_dir_name: dynamodb_table
    misconfigured_exempt: true
    misconfigured_exempt_reason: "DynamoDB table at v1 has no cross-resource FK refs (item-level FKs are out of scope; handler-level table existence is asserted in TestDynamoDB_PutItemMissingTable404)."
    updates_exempt: true
    updates_exempt_reason: "Table mutation (billing_mode flip, GSI addition) is out of scope at v1; the table itself is set-once. S48-T6 reconsiders if scenarios require it."
    integration_test_func_name: "^TestDynamoDB_TableLifecycle$"

  # EKS (S46-T3 handlers, S46-T10 e2e + these matrix entries).
  - aws_service: eks
    aws_resource_type: aws_eks_cluster
    scenario_resource_type: kubernetes
    working_dir_name: eks_cluster
    misconfigured_dir_name: eks_node_group_subnet_outside_cluster
    updates_exempt: true
    updates_exempt_reason: "Cluster updates (version bumps, vpc_config changes) are no-ops at v1; lifecycle is exercised on the addon + nodegroup which both depend on the cluster."
    integration_test_func_name: "^TestEKS_ClusterLifecycle$"
  - aws_service: eks
    aws_resource_type: aws_eks_node_group
    scenario_resource_type: kubernetes
    working_dir_name: eks_cluster
    misconfigured_dir_name: eks_node_group_subnet_outside_cluster
    updates_exempt: true
    updates_exempt_reason: "Nodegroup scaling_config / instance_types updates are no-ops at v1."
    integration_test_func_name: "^TestEKS_NodeGroupSubnetMustBeInCluster$"
  - aws_service: eks
    aws_resource_type: aws_eks_addon
    scenario_resource_type: kubernetes
    working_dir_name: eks_cluster
    misconfigured_exempt: true
    misconfigured_exempt_reason: "Addon under a missing cluster surfaces as 404 — covered by the cluster-deletion CASCADES test in TestEKSCluster_DeleteCASCADESChildren."
    updates_exempt: true
    updates_exempt_reason: "Addon version bumps are no-ops at v1."
    integration_test_func_name: "^TestEKS_AddonLifecycle$"

  # SQS (S46-T5 handlers, S46-T10 e2e + this matrix entry).
  - aws_service: sqs
    aws_resource_type: aws_sqs_queue
    scenario_resource_type: messaging
    working_dir_name: sqs_queue
    misconfigured_exempt: true
    misconfigured_exempt_reason: "FIFO suffix mismatch is asserted in TestSQS_FIFOSuffixContract; standalone misconfigured tofu example would duplicate."
    updates_dir_name: update_sqs_queue_visibility
    integration_test_func_name: "^TestSQS_QueueLifecycle$"
